<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="子供向け英単語フラッシュカードアプリ。間隔反復システム（SRS）で楽しく英語を学ぼう。">
  <meta name="theme-color" content="#1A1A1A">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <title>英単語フラッシュカード</title>

  <link rel="manifest" href="./manifest.json">
  <link rel="icon" type="image/svg+xml" href="./icon.svg">
  <link rel="apple-touch-icon" href="./apple-touch-icon.png">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="./css/base.css">
  <link rel="stylesheet" href="./css/layout.css">
  <link rel="stylesheet" href="./css/flashcard.css">
  <link rel="stylesheet" href="./css/components.css">

  <script type="module" src="./js/app.js"></script>
</head>
<body>
  <div id="app">

    <!-- Desktop Sidebar -->
    <nav class="nav-sidebar" aria-label="メインナビゲーション">
      <div class="nav-sidebar__logo">英単語<br>フラッシュカード</div>
      <div class="nav-sidebar__items">
        <button class="nav-sidebar__item active" data-nav="home">
          <span class="nav-sidebar__icon"></span>ホーム
        </button>
        <button class="nav-sidebar__item" data-nav="study">
          <span class="nav-sidebar__icon"></span>学習
        </button>
        <button class="nav-sidebar__item" data-nav="browse">
          <span class="nav-sidebar__icon"></span>単語一覧
        </button>
        <button class="nav-sidebar__item" data-nav="stats">
          <span class="nav-sidebar__icon"></span>統計
        </button>
        <button class="nav-sidebar__item" data-nav="settings">
          <span class="nav-sidebar__icon"></span>設定
        </button>
      </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
      <div id="view-home" class="view active"></div>
      <div id="view-study" class="view"></div>
      <div id="view-browse" class="view"></div>
      <div id="view-stats" class="view"></div>
      <div id="view-settings" class="view"></div>
    </main>

    <!-- Mobile Bottom Nav -->
    <nav class="nav-bottom" aria-label="メインナビゲーション">
      <button class="nav-bottom__item active" data-nav="home">
        <span class="nav-bottom__icon">🏠</span>
        ホーム
      </button>
      <button class="nav-bottom__item" data-nav="study">
        <span class="nav-bottom__icon">📖</span>
        学習
      </button>
      <button class="nav-bottom__item" data-nav="browse">
        <span class="nav-bottom__icon">🔍</span>
        一覧
      </button>
      <button class="nav-bottom__item" data-nav="stats">
        <span class="nav-bottom__icon">📊</span>
        統計
      </button>
      <button class="nav-bottom__item" data-nav="settings">
        <span class="nav-bottom__icon">⚙️</span>
        設定
      </button>
    </nav>
  </div>

  <noscript>
    <p style="text-align:center;padding:2rem;">このアプリはJavaScriptが必要です。ブラウザの設定でJavaScriptを有効にしてください。</p>
  </noscript>
</body>
</html>
